<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — bleeding.cash Pro</title>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background: var(--bg); }
    .auth-card { background: #fff; border: 1px solid var(--border); border-radius: 1rem; padding: clamp(32px,5vw,56px); width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .auth-logo-text { font-family: var(--font-display); font-size: 1.125rem; font-weight: 600; }
    .auth-pro-badge { background: #01696F; color: #fff; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 100px; }
    .auth-title { font-family: var(--font-display); font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    .auth-sub { font-size: 0.875rem; color: var(--muted); margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 0.5rem; font-size: 0.9rem; transition: border-color 150ms; }
    .form-group input:focus { outline: none; border-color: #01696F; }
    .btn-teal { background: #01696F; color: #fff; border: none; width: 100%; padding: 14px; border-radius: 0.5rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 150ms; }
    .btn-teal:hover { background: #015a60; }
    .btn-teal:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 0.5rem; padding: 12px 16px; font-size: 0.8rem; color: #dc2626; margin-bottom: 16px; display: none; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.8rem; color: var(--muted); }
    .auth-footer a { color: #01696F; font-weight: 600; }
    .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;">
        <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#c0392b"/>
          <path d="M16 6C16 6 10 10 10 17C10 20.866 12.686 24 16 24C19.314 24 22 20.866 22 17C22 10 16 6 16 6Z" fill="white" opacity="0.9"/>
          <path d="M16 13C16 13 13 15.5 13 18.5C13 20.433 14.343 22 16 22C17.657 22 19 20.433 19 18.5C19 15.5 16 13 16 13Z" fill="#c0392b"/>
        </svg>
        <span class="auth-logo-text">bleeding.cash</span>
      </a>
      <span class="auth-pro-badge">PRO</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Log in to your Pro consultant account</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@yourfirm.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn-teal" id="submitBtn">
        <span id="btnText">Log In</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>

    <div class="auth-footer" style="margin-top:24px;">
      Don't have an account? <a href="/pro/signup">Start 3-day trial</a>
    </div>
    <div class="auth-footer" style="margin-top:8px;">
      <a href="/" style="color:var(--muted);">← Back to bleeding.cash</a>
    </div>
  </div>
</div>

<script>
const RAILWAY = 'https://gsb-swarm-production.up.railway.app';

// Auto-redirect if already logged in
const existingToken = localStorage.getItem('pro_token');
if (existingToken) window.location.href = '/pro/dashboard';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('errorMsg');
  const btn      = document.getElementById('submitBtn');
  const spinner  = document.getElementById('spinner');
  const btnText  = document.getElementById('btnText');

  errEl.style.display = 'none';
  btn.disabled = true;
  btnText.style.display = 'none';
  spinner.style.display = 'block';

  try {
    const res = await fetch(`${RAILWAY}/api/pro/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      errEl.textContent = data.error || 'Login failed. Check your email and password.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btnText.style.display = 'block';
      spinner.style.display = 'none';
      return;
    }

    localStorage.setItem('pro_token', data.token);
    localStorage.setItem('pro_email', email);
    localStorage.setItem('pro_firm', data.firmName || '');
    window.location.href = '/pro/dashboard';
  } catch {
    errEl.textContent = 'Network error. Try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btnText.style.display = 'block';
    spinner.style.display = 'none';
  }
});
</script>
</body>
</html>
